server.port=${PORT:5000}
server.address=0.0.0.0

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:movie_rec_db}?useSSL=${MYSQL_SSL:false}&requireSSL=${MYSQL_SSL:false}&verifyServerCertificate=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jackson.serialization.write-dates-as-timestamps=false
