services:
  - type: web
    name: cinematch-api
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: mvn -DskipTests package
    startCommand: java -jar target/cinematch-api-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        value: defaultdb
      - key: MYSQL_SSL
        value: "true"
      - key: FRONTEND_URL
        sync: false
