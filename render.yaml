services:
  - type: web
    name: cinematch-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node db-server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        value: movie_rec_db
      - key: MYSQL_SSL
        value: "true"
      - key: FRONTEND_URL
        sync: false
